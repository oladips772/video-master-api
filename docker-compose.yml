version: "3.8"

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-media-master-v2
    ports:
      - "49000:9000" # MinIO API
      - "49001:9001" # MinIO Console.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts-service-v2
    environment:
      - DOWNLOAD_MODEL=true
    ports:
      - "8880:8880"
    restart: unless-stopped

  xtts:
    image: daswer123/xtts-api-server:latest
    container_name: xtts-service-v2
    ports:
      - "5002:8020"
    environment:
      - COQUI_TOS_AGREED=1
    volumes:
      - xtts_models:/app/models
      - /root/video-master-api/speakers:/app/speakers:ro
    restart: unless-stopped

  api:
    build: .
    container_name: media-master-api-v2
    ports:
      - "2000:8000"
    environment:
      - API_KEY=${API_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - KOKORO_TIMEOUT=120
      - KOKORO_MAX_TEXT_LENGTH=1000
      - XTTS_API_URL=${XTTS_API_URL:-http://xtts:8020}
      - XTTS_TIMEOUT=${XTTS_TIMEOUT:-300}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - RECAP_SCRATCH_ROOT=${RECAP_SCRATCH_ROOT:-/tmp/recap}
      - RECAP_WHISPER_MODEL=${RECAP_WHISPER_MODEL:-medium}
      - RECAP_SCENE_SNAP=${RECAP_SCENE_SNAP:-0}
      - RECAP_FFMPEG_NICE=${RECAP_FFMPEG_NICE:-10}
      - PIPELINE_SHARED_SECRET=${PIPELINE_SHARED_SECRET:-}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - /root/video-master-api/speakers:/app/speakers:ro
    depends_on:
      - minio
      - kokoro-tts
      - xtts
    restart: unless-stopped

volumes:
  minio_data:
  xtts_models:

networks:
  default:
    driver: bridge
