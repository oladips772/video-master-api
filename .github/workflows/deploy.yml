# @format

name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/video-master-api

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Building api with no cache..."
            docker compose build api --no-cache --pull

            echo "Restarting api..."
            docker compose up -d api

            echo "Pruning old images..."
            docker image prune -f

            echo "Verifying deploy..."
            docker compose ps api
            docker compose exec -T api grep "base_video" /app/app/services/recap/assemble.py || echo "WARN: base_video not found"
